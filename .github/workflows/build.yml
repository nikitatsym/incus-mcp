name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4

      - name: Compute version
        id: version
        run: |
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1 | sed 's/^v//')
          if [ -z "$LATEST" ]; then
            VERSION="1.0.0"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
            VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml

      - name: Build wheel
        run: uv build --wheel --out-dir dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          gh release create "v${VERSION}" dist/*.whl --title "v${VERSION}" --generate-notes

      - name: Build Pages
        run: |
          mkdir -p _site/simple/incus-mcp
          cp docs/index.html _site/index.html

          echo '<!DOCTYPE html><html><body>' > _site/simple/index.html
          echo '<a href="incus-mcp/">incus-mcp</a>' >> _site/simple/index.html
          echo '</body></html>' >> _site/simple/index.html

          echo '<!DOCTYPE html><html><body>' > _site/simple/incus-mcp/index.html
          for tag in $(git tag -l 'v*' --sort=-v:refname); do
            v=${tag#v}
            whl="incus_mcp-${v}-py3-none-any.whl"
            url="https://github.com/${{ github.repository }}/releases/download/${tag}/${whl}"
            echo "<a href=\"${url}\">${whl}</a><br>" >> _site/simple/incus-mcp/index.html
          done
          echo '</body></html>' >> _site/simple/incus-mcp/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
